name: User Service CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 🔹 Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🔹 Give permission to Maven wrapper
      - name: Grant execute permission
        run: chmod +x mvnw

      # 🔹 Build project
      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      # 🔍 Debug secrets (REMOVE after success)
      - name: Debug secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then echo "USERNAME EMPTY"; else echo "USERNAME OK"; fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then echo "PASSWORD EMPTY"; else echo "PASSWORD OK"; fi

      # 🔐 Docker login (MANUAL - more reliable)
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 🐳 Build Docker image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest .

      # 🚀 Push to Docker Hub
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest
